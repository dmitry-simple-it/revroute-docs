name: Deploy revroute-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        env:
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ vars.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
        run: |
          set -euo pipefail

          npm ci
          npm run build

          systemctl stop revroute-docs

          rm -rf /var/www/revroute-docs/*
          rm -rf /var/www/revroute-docs/.next

          cp -r .next/standalone/. /var/www/revroute-docs/
          cp -r .next/static /var/www/revroute-docs/.next/static

          if [ -d "public" ]; then
            cp -r public /var/www/revroute-docs/public
          fi

          systemctl start revroute-docs

          for i in $(seq 1 20); do
            if curl -sf -o /dev/null http://127.0.0.1:3335/; then
              echo "revroute-docs healthy"
              exit 0
            fi
            sleep 1
          done
          echo "revroute-docs did not become healthy" >&2
          systemctl status revroute-docs --no-pager -l || true
          exit 1
