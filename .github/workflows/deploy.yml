name: Deploy revroute-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight deploys on the same branch
concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 79.174.90.206 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on server
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
              root@79.174.90.206 \
              "GIT_REF=${{ github.sha }} bash -s" <<'REMOTE'
          set -euo pipefail

          REPO_DIR=/var/www/revroute-docs

          echo "==> Sync repo to $GIT_REF"
          cd "$REPO_DIR"
          git fetch --all --prune
          git checkout "$GIT_REF"

          echo "==> make build (native Next.js build + pagefind)"
          make build

          echo "==> make image (package .next/standalone into Docker)"
          make image

          echo "==> make up (recreate container)"
          make up

          echo "==> healthcheck"
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:3335/; then
              echo "docs healthy"
              exit 0
            fi
            sleep 2
          done

          echo "ERROR: docs did not become healthy in 60s" >&2
          docker logs revroute-docs --tail=200 || true
          exit 1
          REMOTE

      - name: Prune dangling images on server
        if: always()
        run: |
          # Only removes DANGLING images (no tag — leftovers of `docker build`
          # when :latest got overwritten). Does NOT touch tagged images of
          # stopped containers (metabase, minio, etc.).
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
              root@79.174.90.206 \
              'docker image prune -f --filter "until=72h" 2>/dev/null || true'
