name: Deploy revroute-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        run: |
          npm ci
          npm run build

          # Copy standalone build to deploy dir
          rm -rf /var/www/revroute-docs/.next
          rm -rf /var/www/revroute-docs/server.js
          rm -rf /var/www/revroute-docs/node_modules

          cp -r .next/standalone/* /var/www/revroute-docs/
          mkdir -p /var/www/revroute-docs/.next/static
          cp -r .next/static/* /var/www/revroute-docs/.next/static/

          if [ -d "public" ]; then
            mkdir -p /var/www/revroute-docs/public
            cp -r public/* /var/www/revroute-docs/public/
          fi

          # Restart app
          cd /var/www/revroute-docs
          pm2 delete revroute-docs 2>/dev/null || true
          PORT=3335 pm2 start server.js --name revroute-docs
          pm2 save
