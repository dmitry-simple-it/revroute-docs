<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поддержка — Revrote</title>
    <meta name="description" content="Свяжитесь с командой поддержки Revrote.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fafaf9;
            --bg-white: #ffffff;
            --bg-card: #ffffff;
            --bg-muted: #f5f5f4;
            --bg-dark: #0c0a09;
            --border: #e7e5e4;
            --text: #0c0a09;
            --text-secondary: #44403c;
            --text-muted: #78716c;
            --text-dim: #a8a29e;
            --accent: #0c0a09;
            --accent-hover: #1c1917;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
            --font-display: 'Instrument Serif', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 16px 0;
            background: rgba(250,250,249,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }
        .header.scrolled { border-bottom-color: var(--border); }
        .header .container {
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            font-family: var(--font-body);
            font-size: 20px; font-weight: 800;
            color: var(--text); text-decoration: none;
            letter-spacing: -0.5px;
        }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 20px; border-radius: 980px;
            font-family: var(--font-body); font-size: 14px; font-weight: 600;
            text-decoration: none; border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--bg-muted); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

        /* Main content */
        .support-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
        }

        .support-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .support-icon {
            width: 64px; height: 64px;
            background: var(--bg-muted);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }

        .support-card h1 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .support-card p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .support-email-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 980px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .support-email-link:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .support-email-link svg {
            width: 18px; height: 18px;
        }

        .support-note {
            margin-top: 24px;
            color: var(--text-dim);
            font-size: 13px;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
        }
        .footer-bottom {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: var(--text-dim);
        }
        .footer-bottom a {
            color: var(--text-dim); text-decoration: none; margin-right: 16px;
        }
        .footer-bottom a:hover { color: var(--text-muted); }

        @media (max-width: 640px) {
            .support-card { padding: 32px 24px; }
            .support-card h1 { font-size: 26px; }
            .footer-bottom { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>
<body>

    <header class="header" id="header">
        <div class="container">
            <a href="/" class="logo">Revrote</a>
            <div class="header-actions">
                <a href="https://app.revroute.ru/" class="btn btn-ghost">Войти</a>
                <a href="https://app.revroute.ru/" class="btn btn-primary">Начать бесплатно</a>
            </div>
        </div>
    </header>

    <main class="support-section">
        <div class="support-card">
            <div class="support-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2"/>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
            </div>
            <h1>Поддержка</h1>
            <p>Напишите нам, и мы поможем с любым вопросом по продукту, биллингу или интеграциям.</p>
            <a href="mailto:support@revroute.ru" class="support-email-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2"/>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
                support@revroute.ru
            </a>
            <p class="support-note">Обычно отвечаем в течение нескольких часов</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <span>&copy; 2025 Revrote. Все права защищены.</span>
                <span>
                    <a href="#">Конфиденциальность</a>
                    <a href="#">Условия</a>
                </span>
            </div>
        </div>
    </footer>

    <script>
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            header.classList.toggle('scrolled', window.scrollY > 20);
        });
    </script>

</body>
</html>
