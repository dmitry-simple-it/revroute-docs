name: Deploy revroute-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        run: |
          npm ci
          npm run build

          # Stop running app
          pm2 delete revroute-docs 2>/dev/null || true

          # Clean deploy dir
          rm -rf /var/www/revroute-docs/*
          rm -rf /var/www/revroute-docs/.next

          # Copy standalone build (including hidden .next dir)
          cp -r .next/standalone/. /var/www/revroute-docs/

          # Add static assets (not included in standalone)
          cp -r .next/static /var/www/revroute-docs/.next/static

          # Add public folder
          if [ -d "public" ]; then
            cp -r public /var/www/revroute-docs/public
          fi

          # Start app
          cd /var/www/revroute-docs
          PORT=3335 pm2 start server.js --name revroute-docs
          pm2 save
